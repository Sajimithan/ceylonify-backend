services:
  db:
    image: postgis/postgis:16-3.4
    container_name: ceylonify-db
    environment:
      POSTGRES_USER: ceylonify
      POSTGRES_PASSWORD: ceylonify
      POSTGRES_DB: ceylonify
    ports:
      - "5432:5432"
    volumes:
      - ceylonify_db_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

volumes:
  ceylonify_db_data:
